version: 1
name: bob_help
intent: |
    bob --help lists the repository lifecycle so people and agents can discover
    the plan-before-mutation workflow.
target:
    cmd:
        - ./bin/bob
        - --help
    cwd: .
terminal:
    cols: 100
    rows: 40
    profile: xterm-256color
steps:
    - wait:
        process:
            exitCode: 0
        timeoutMs: 5000
    - snapshot: help
outcomes:
    - id: lists_plan
      description: help lists the read-only plan command
      verify:
        screen:
            contains: plan
    - id: lists_apply
      description: help lists the explicit apply command
      verify:
        screen:
            contains: apply
    - id: states_product
      description: help identifies Bob as a deterministic repository factory
      verify:
        screen:
            contains: deterministic repository factory
    - id: lists_inspect
      description: help lists the offline workspace inventory command
      verify:
        screen:
            contains: inspect
    - id: lists_mcp
      description: help lists the compact MCP surface
      verify:
        screen:
            contains: mcp
    - id: lists_config
      description: help lists the user configuration command
      verify:
        screen:
            contains: config
    - id: lists_stats
      description: help lists the local aggregate usage command
      verify:
        screen:
            contains: stats
    - id: lists_studio
      description: help lists the interactive read-only studio
      verify:
        screen:
            contains: studio
    - id: lists_context
      description: help lists the bounded workspace contract command
      verify:
        screen:
            contains: context
    - id: lists_path
      description: help lists exact path ownership guidance
      verify:
        screen:
            contains: path
    - id: lists_playbook
      description: help lists deterministic procedural guidance
      verify:
        screen:
            contains: playbook
contractHash: sha256:42d913aa1d0fd4e68a7bc42220cfa887d966c33fa9781154db1fad9fd73f60ef
