version: 1
name: bob_help
intent: |
    bob --help lists the repository lifecycle so people and agents can discover
    the plan-before-mutation workflow.
target:
    cmd:
        - ./bin/bob
        - --help
    cwd: .
terminal:
    cols: 100
    rows: 40
    profile: xterm-256color
steps:
    - wait:
        process:
            exitCode: 0
        timeoutMs: 5000
    - snapshot: help
outcomes:
    - id: lists_plan
      description: help lists the read-only plan command
      verify:
        screen:
            contains: plan
    - id: lists_apply
      description: help lists the explicit apply command
      verify:
        screen:
            contains: apply
    - id: states_product
      description: help identifies Bob as a deterministic repository factory
      verify:
        screen:
            contains: deterministic repository factory
    - id: lists_inspect
      description: help lists the offline workspace inventory command
      verify:
        screen:
            contains: inspect
    - id: lists_mcp
      description: help lists the compact MCP surface
      verify:
        screen:
            contains: mcp
contractHash: sha256:b549fe2e186cec835c36d29c36c03935cbd1d53ba13b983d3f870c84acb1b720
