version: "3"

vars:
  BINARY_NAME: bob
  BUILD_DIR: ./bin
  MODULE: github.com/abdul-hamid-achik/bob
  MAIN: ./cmd/bob
  VERSION:
    sh: git describe --tags --always --dirty 2>/dev/null || echo dev
  COMMIT:
    sh: git rev-parse --short HEAD 2>/dev/null || echo none
  BUILD_TIME:
    sh: date -u +%Y-%m-%dT%H:%M:%SZ
  LDFLAGS: >-
    -s -w
    -X {{.MODULE}}/internal/version.Version={{.VERSION}}
    -X {{.MODULE}}/internal/version.Commit={{.COMMIT}}
    -X {{.MODULE}}/internal/version.Date={{.BUILD_TIME}}

env:
  CGO_ENABLED: "0"

tasks:
  default:
    desc: List available tasks
    cmds: [task --list]
    silent: true

  fmt:
    desc: Format Go source
    cmds: [gofmt -s -w .]

  fmt-check:
    desc: Check Go formatting without changing files
    cmds:
      - test -z "$(gofmt -l .)" || (gofmt -l .; exit 1)

  tidy-check:
    desc: Check module files without changing them
    cmds: [go mod tidy -diff]

  lint:
    desc: Lint Go source
    cmds:
      - |
        if golangci-lint version 2>/dev/null | grep -qE 'version v?2\.'; then
          golangci-lint run ./...
        else
          go vet ./...
          test -z "$(gofmt -l .)" || (gofmt -l .; exit 1)
        fi

  test:
    desc: Run unit tests
    cmds: [go test -count=1 ./...]

  race:
    desc: Run unit tests with the race detector
    env:
      CGO_ENABLED: "1"
    cmds: [go test -race -count=1 ./...]

  vet:
    desc: Run Go static analysis
    cmds: [go vet ./...]

  vuln:
    desc: Scan called Go code for known vulnerabilities
    cmds: [go run golang.org/x/vuln/cmd/govulncheck@v1.6.0 ./...]

  cover:
    desc: Generate a local HTML coverage report
    cmds:
      - go test -coverprofile=coverage.out ./...
      - go tool cover -html=coverage.out -o coverage.html
      - 'echo "Coverage report: coverage.html"'

  check:
    desc: Run the canonical non-mutating verification gate
    aliases: [ci, verify]
    cmds:
      - task: fmt-check
      - task: tidy-check
      - task: lint
      - task: vet
      - task: test
      - task: race
      - task: build-check
      - task: vuln

  build-check:
    desc: Check that the CLI builds without writing into the workspace
    cmds:
      - |
        output="$(mktemp)"
        trap 'rm -f "$output"' EXIT
        go build -trimpath -ldflags "{{.LDFLAGS}}" -o "$output" {{.MAIN}}

  build:
    desc: Build ./bin/bob
    cmds:
      - mkdir -p {{.BUILD_DIR}}
      - go build -trimpath -ldflags "{{.LDFLAGS}}" -o {{.BUILD_DIR}}/{{.BINARY_NAME}} {{.MAIN}}

  install:
    desc: Install bob to GOPATH/bin
    cmds:
      - go install -ldflags "{{.LDFLAGS}}" {{.MAIN}}

  specs:
    desc: Run terminal behavior specs
    deps: [build]
    cmds:
      - glyph run specs/glyphrun/*.yml --format md --progress auto

  release-check:
    desc: Validate the GoReleaser configuration
    cmds: [goreleaser check]

  snapshot:
    desc: Build the complete release package locally without publishing
    cmds: [goreleaser release --snapshot --clean]

  docs-deps:
    desc: Install locked documentation dependencies
    cmds: [npm --prefix docs ci]

  docs:
    desc: Start the documentation development server
    deps: [docs-deps]
    cmds: [npm --prefix docs run dev]

  docs-build:
    desc: Build the documentation site
    deps: [docs-deps]
    cmds: [npm --prefix docs run build]

  docs-preview:
    desc: Preview the built documentation site
    deps: [docs-deps]
    cmds: [npm --prefix docs run preview]

  ship:
    desc: Run the complete local pre-release gate
    cmds:
      - task: check
      - task: specs
      - task: docs-build
      - task: snapshot

  clean:
    desc: Remove local build output
    cmds:
      - rm -rf {{.BUILD_DIR}} dist coverage.out coverage.html docs/node_modules docs/.vitepress/cache docs/.vitepress/dist
