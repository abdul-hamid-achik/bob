version: 2

project_name: bob

builds:
  - id: bob
    main: ./cmd/bob
    binary: bob
    env: [CGO_ENABLED=0]
    goos: [linux, darwin]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w
      - -X github.com/abdul-hamid-achik/bob/internal/version.Version={{.Version}}
      - -X github.com/abdul-hamid-achik/bob/internal/version.Commit={{.ShortCommit}}
      - -X github.com/abdul-hamid-achik/bob/internal/version.Date={{.Date}}

archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files: [README.md, LICENSE, CHANGELOG.md]

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude: ["^docs:", "^test:", "^ci:", "^chore:"]

homebrew_casks:
  - name: bob
    binaries: [bob]
    repository:
      owner: abdul-hamid-achik
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Casks
    homepage: https://github.com/abdul-hamid-achik/bob
    description: Deterministic repository factory for agent-native developer tools
    license: MIT
    caveats: "Run `bob doctor` to inspect required and optional tools. Use `bob plan` before the explicit `bob apply`; launch `bob studio` for a read-only terminal view, or `bob mcp serve` for six typed repository tools. macOS may require explicit approval for an unsigned build."
    hooks:
      post:
        install: |
          if OS.mac?
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/bob"]
          end
    skip_upload: "{{ if .Env.HOMEBREW_TAP_TOKEN }}false{{ else }}true{{ end }}"

release:
  github:
    owner: abdul-hamid-achik
    name: bob
  draft: false
  prerelease: auto
