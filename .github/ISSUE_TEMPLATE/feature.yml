name: Feature request
description: Propose a recipe, capability, or workflow improvement
title: "feat: "
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What repository-building problem should Bob solve?
    validations:
      required: true
  - type: textarea
    id: contract
    attributes:
      label: Smallest useful contract
      description: Show the smallest manifest, command, or tool shape that solves the problem.
    validations:
      required: true
  - type: textarea
    id: safety
    attributes:
      label: Ownership and safety
      description: Which files would Bob own, observe, or refuse to change?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What can users do today, and why is it insufficient?
