name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache: true
      - name: Unit tests
        run: go test -count=1 ./...
      - name: Race tests
        run: go test -race -count=1 ./...
      - name: Vet
        run: go vet ./...
      - name: Build
        run: go build ./cmd/bob
      - name: Tidy is clean
        run: go mod tidy -diff

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache: true
      - uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2
